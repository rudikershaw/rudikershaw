<!DOCTYPE html>
<html lang="en" dir="ltr" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>Rudi Kershaw's Bibliography</title>
		<meta name="description" content="." />
		<meta name="author" content="Rudi Kershaw" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" type="text/css" href="/styles/style.min.css?v=3" />
		<link rel="shortcut icon" href="/images/RK.ico" />
		<link rel="stylesheet" type="text/css" href="/styles/vendor/font-awesome.min.css" />
		<script> var FF_FOUC_FIX; </script>
    </head>
	<body>
		<div class="faded-background-cover"></div>
		<header th:replace="index :: header"></header>

		<section class="container off-centre">
			<h1 id="bibliography-start">Bibliography</h1>
			<br /><br />

			<ol id="bibliography-list">
				<li class="date-divider"><h2>Today</h2></li>
				<li id="bibliography-item-template" style="display: none">
					<cite></cite><span class="author-sep"> - </span><i><span class="author"></span></i>
					<p class="synopsis"></p>
				</li>
			</ol>
		</section>

		<footer th:replace="index :: footer"></footer>
		<script async src="/scripts/bibliography.min.js"></script>
	</body>
</html>
